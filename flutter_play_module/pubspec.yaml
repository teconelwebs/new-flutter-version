name: welfog_flutter_play
description: Welfog Play / Reels module (used as local package by main Flutter app)
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  video_player: ^2.9.2
  device_info_plus: ^11.3.0
  share_plus: ^10.1.4
  image_picker: ^1.1.2
  image_cropper: ^12.2.1
  path: ^1.9.1
  path_provider: ^2.1.5
  http_parser: ^4.1.2
  shared_preferences: ^2.3.5
  audioplayers: ^6.1.0
  screenshot: ^3.0.0
  v_video_compressor: ^2.0.0
  flash_list: ^0.0.2
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
